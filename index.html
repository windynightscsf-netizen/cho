<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사주 만세력 — 四柱萬歲曆</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-sub">四柱萬歲曆</div>
  <h1>사주 만세력</h1>
  <p class="header-desc">생년월일시로 사주팔자를 풀어드립니다</p>
</header>

<main>
  <!-- Input Form -->
  <div class="form-card">
    <h2>✦ 생년월일시 입력</h2>
    <form id="saju-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">이름 (선택)</label>
          <input type="text" id="name" placeholder="이름을 입력하세요">
        </div>
        <div class="form-group">
          <label for="birthdate">생년월일 *</label>
          <input type="date" id="birthdate" required>
        </div>
        <div class="form-group">
          <label for="birthtime">태어난 시간</label>
          <input type="time" id="birthtime" placeholder="모르면 비워두세요">
          <span class="form-note">모르시면 비워두셔도 됩니다 (정오 기준)</span>
        </div>
      </div>
      <button type="submit" class="submit-btn">사주 보기 ✦</button>
    </form>
  </div>

  <!-- Results -->
  <div id="result-section" class="hidden">
    <div class="result-header" id="result-name">사주 분석</div>

    <!-- Four Pillars -->
    <div class="section-card">
      <h3>✦ 사주팔자 (四柱八字)</h3>
      <div id="pillars-display"></div>
    </div>

    <!-- Five Elements -->
    <div class="section-card">
      <h3>✦ 오행 분석 (五行分析)</h3>
      <div id="element-analysis"></div>
      <div id="element-balance"></div>
    </div>

    <!-- Personality -->
    <div class="section-card">
      <h3>✦ 성격 분석</h3>
      <div id="personality-title"></div>
      <div id="personality-traits"></div>
      <p id="personality-desc"></p>
    </div>

    <!-- Daily Fortune -->
    <div class="section-card">
      <h3>✦ 오늘의 운세</h3>
      <div class="fortune-header">
        <span id="fortune-date"></span>
        <span id="fortune-luck"></span>
      </div>
      <p id="fortune-message"></p>
    </div>
  </div>
</main>

<footer>
  사주 만세력 · 四柱命理 · 절기 기준 사주 계산
</footer>

<script src="js/manseryeok.js"></script>
<script src="js/analysis.js"></script>
<script src="js/app.js"></script>
</body>
</html>
